<!DOCTYPE html>
<html>
<head>
    <title>Redirecting</title>
</head>
<body>
    <h1>Redirecting to <a href="https://katze.click">katze.click</a></h1>
    
    <!-- Method 1: Using meta refresh -->
    <meta http-equiv="refresh" content="0;url=https://katze.click">
    
    <!-- Method 2: Using JavaScript -->
    <script>
        window.location.href = "https://katze.click";
    </script>
    <!-- Method 4: Using an iframe -->
    <iframe src="https://katze.click" style="border: 0; width: 100%; height: 100vh;"></iframe>
    
    <!-- Method 5: Using a hyperlink -->
    <a href="https://katze.click">Click here to go to katze.click</a>
</body>
</html>
